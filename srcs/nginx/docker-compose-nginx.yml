services:
  nginx:
    build: .
    container_name: nginx_proxy
    restart: always
    ports:
      # - "80:80" # <--- Para la redirección
      - "443:443"  # <--- EL ÚNICO PUERTO EXPUESTO (HTTPS Obligatorio)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      public_net:     # Conectado al exterior
      transcendence_net: # Conectado a la capa de aplicación
    depends_on:
      - ${FE_CONTAINER_NAME:-frontend}
      - ${BE_CONTAINER_NAME:-backend}