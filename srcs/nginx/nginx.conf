# En esta archivo se indica  a Nginx a qué contenedor enviar
# cada petición (Frontend, Backend, WebSockets...).

events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------------
    # 1. REDIRECCIÓN HTTP -> HTTPS (Opcional, pero buena práctica)
    # ----------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------------
    # 2. SERVIDOR PRINCIPAL HTTPS (El único punto de entrada)
    # ----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name localhost;

        # --- CERTIFICADOS SSL (Generados en el Dockerfile) ---
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # --- CABECERAS DE SEGURIDAD (Obligatorio para buena nota) ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ------------------------------------------------------------------
        # A) FRONTEND (React + Vite)
        # ------------------------------------------------------------------
        location / {
            # Redirige el tráfico al contenedor 'frontend' (usa el puerto de tu .env, ej: 5173)
            proxy_pass http://frontend:5173;
            
            # Cabeceras estándar para proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Soporte para WebSockets internos de Vite (HMR - Hot Module Replacement)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        # ------------------------------------------------------------------
        # B) BACKEND API (NestJS)
        # ------------------------------------------------------------------
        # Todo lo que empiece por /api se va al backend
        location /api/ {
            # Redirige al contenedor 'backend' (usa el puerto de tu .env, ej: 3000)
            proxy_pass http://backend:3000;
            proxy_http_version 1.1; # Importante para evitar 502 en conexiones persistentes
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rutas de Autenticación (OAuth 42 y Google)
        location /auth/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- AÑADIMOS LAS RUTAS FALTANTES DE FORMA EXPLÍCITA ---

        location /countries {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rutas del módulo de Amigos
        location /friends {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /profile {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rutas del módulo de Chat
        location /chat {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # C) WEBSOCKETS DEL JUEGO Y CHAT (Socket.io)
        # ------------------------------------------------------------------
        location /socket.io/ {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            # Estas dos cabeceras son la magia que convierte HTTP normal en WebSockets
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # ------------------------------------------------------------------
        # D) HERRAMIENTAS DE ADMINISTRACIÓN Y MONITORIZACIÓN
        # ------------------------------------------------------------------
        
        # --- ADMINER (Gestor de Base de Datos) ---
        location /adminer/ {
            # OJO al '/' final: es crucial para que Nginx recorte '/adminer' antes de enviarlo
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- GRAFANA (Dashboards) ---
        location /grafana/ {
            # Tu Grafana escucha internamente en el puerto 3500 según tu .env
            proxy_pass http://grafana:3500;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- PROMETHEUS (Métricas brutas) ---
        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}